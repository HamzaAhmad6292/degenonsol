<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" aria-hidden="true">
  <defs>
    <!-- Core: warm, soft gradient — no sharp edge -->
    <radialGradient id="sunCore" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fff8e8" stop-opacity="0.98"/>
      <stop offset="25%" stop-color="#ffe4b8" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#ffd090" stop-opacity="0.9"/>
      <stop offset="75%" stop-color="#f0b060" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#e09848" stop-opacity="0.5"/>
    </radialGradient>
    <!-- Outer glow — very soft, large falloff -->
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4dc" stop-opacity="0.5"/>
      <stop offset="30%" stop-color="#ffdfa0" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="#ffc870" stop-opacity="0.15"/>
      <stop offset="80%" stop-color="#ffb040" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffa030" stop-opacity="0"/>
    </radialGradient>
    <!-- Soft edge blur so the disc doesn't look cut out -->
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Large atmospheric bloom -->
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="28" result="blur"/>
      <feFlood flood-color="#ffd8a0" flood-opacity="0.35"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Outer bloom first -->
  <circle cx="100" cy="100" r="85" fill="url(#sunGlow)" filter="url(#softGlow)" opacity="0.9"/>
  <!-- Main disc — smaller visible core so it reads as soft ball of light -->
  <circle cx="100" cy="100" r="38" fill="url(#sunCore)" filter="url(#glow)" opacity="0.95"/>
  <circle cx="100" cy="100" r="38" fill="url(#sunCore)" opacity="0.92"/>
</svg>
