<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 120" aria-hidden="true">
  <defs>
    <linearGradient id="cloudAltTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.97"/>
      <stop offset="50%" stop-color="#f1f5f9" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#e2e8f0" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="cloudAltUnder" x1="0%" y1="100%" x2="0%" y2="40%">
      <stop offset="0%" stop-color="#94a3b8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <filter id="cloudAltSoft" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cloudAltShadow" x="-15%" y="-5%" width="130%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#64748b" flood-opacity="0.12"/>
    </filter>
  </defs>
  <g filter="url(#cloudAltSoft)">
    <g filter="url(#cloudAltShadow)">
      <ellipse cx="70" cy="72" rx="48" ry="28" fill="url(#cloudAltTop)"/>
      <ellipse cx="135" cy="65" rx="55" ry="32" fill="url(#cloudAltTop)"/>
      <ellipse cx="200" cy="74" rx="44" ry="26" fill="url(#cloudAltTop)"/>
      <ellipse cx="105" cy="82" rx="36" ry="22" fill="url(#cloudAltTop)"/>
      <ellipse cx="168" cy="78" rx="32" ry="20" fill="url(#cloudAltTop)"/>
      <ellipse cx="135" cy="92" rx="75" ry="24" fill="url(#cloudAltUnder)"/>
    </g>
  </g>
</svg>
